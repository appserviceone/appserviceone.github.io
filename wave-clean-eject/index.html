<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <link
      rel="icon"
      type="image/png"
      href="/icon/favicon-96x96.png"
      sizes="96x96"
    />
    <link rel="icon" type="image/svg+xml" href="icon/favicon.svg" />
    <link rel="shortcut icon" href="icon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="icon/apple-touch-icon.png"
    />
    <link rel="manifest" href="icon/site.webmanifest" />
    <title>WaveCleaner: Water Eject</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap");

      * {
        padding: 0;
        margin: 0;
      }

      html {
        height: 100%;
        background-color: #e1e1e1;
      }

      body {
        font-family: "Oswald", sans-serif;
        color: #444;
      }

      .main {
        margin: 0 auto;
        width: 100%;
        display: flex;
        justify-content: center;
        position: absolute;
        left: 50%;
        top: 50%;
        -webkit-transform: translateX(-50%) translateY(-50%);
        -moz-transform: translateX(-50%) translateY(-50%);
        transform: translateX(-50%) translateY(-50%);
      }

      .logo {
        width: 100%;
        display: flex;
        padding-top: 20px;
        align-items: center;
        justify-content: center;
        box-shadow: 0 7px 40px -1px rgba(0, 0, 0, 0.1);
      }

      .logo img {
        width: 100%;
        max-width: 300px;
        padding: 15px 15px 0px 15px;
      }

      .inside {
        background: #fff;
        border-radius: 20px;
        width: 700px;
        display: flex;
        flex-direction: column;
        align-items: center;
        align-self: center;
        flex-wrap: wrap;
      }

      .inside > div img {
        width: 100%;
        max-width: 550px;
      }

      .inside > div h1 {
        font-size: 2em;
        text-align: center;
        color: #111;
        margin-bottom: 10px;
      }

      .inside > div p {
        font-size: 1.7em;
        text-align: center;
        color: #111;
      }

      .link {
        font-size: 1em;
        white-space: nowrap;
        text-decoration: none;
        color: #fff;
        background: #008fff;
        padding: 10px 15px 10px 15px;
        border-radius: 12px;
      }

      .text-name {
        padding-top: 10px;
      }

      .icons {
        display: flex;
        align-self: center;
        align-items: center;
        align-content: space-between;
        flex-wrap: wrap;
        grid-gap: 20px;
        column-gap: 0px;
        margin: 20px;
      }

      .icons p {
        line-height: 24px;
      }

      .break {
        padding: 5px;
      }

      .icons > div img {
        width: 120px;
      }

      @media screen and (max-width: 650px) {
        .inside > div p {
          font-size: 1.4em;
        }

        .inside > div h1 {
          font-size: 1.7em;
        }
      }

      @media screen and (max-width: 350px) {
        .icons {
          flex-direction: column;
          grid-gap: 7px;
        }

        .break {
          padding: 10px;
        }
      }
    </style>
  </head>

  <body>
    <div class="main">
      <div class="inside">
        <div class="logo">
          <img
            src="banner-site.png"
            alt="WaveCleaner: Water Eject"
            title="WaveCleaner: Water Eject"
          />
        </div>
        <div class="text-name">
          <h1>WaveCleaner: Water Eject</h1>
          <p>Speaker Cleaner & dB Tool</p>
        </div>
        <div class="icons">
          <div>
            <a class="link" href="privacy-policy.html">Privacy Policy</a>
          </div>
          <div class="break"></div>
          <div>
            <a class="link" href="terms-conditions.html">Terms & Conditions</a>
          </div>
          <div class="break"></div>
          <div>
            <a
              target="_blank"
              href="https://apps.apple.com/app/apple-store/id6780782822"
              ><img
                src="https://appserviceone.github.io/app-store-logo.png"
                alt="App Store"
                title="App Store"
            /></a>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
